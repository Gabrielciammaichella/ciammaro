{% extends "base.html" %}
{% block content %}

<section class="grid">
  {% for p in productos %}
  <article class="card">
    <div class="card__media">
      <img src="{{ url_for('static', filename=p['img']) }}" alt="{{ p['nombre'] }}">
    </div>

    <div class="card__body">
      <div class="card__top">
        <h3>{{ p['nombre'] }}</h3>
        <div class="price">${{ "{:,.0f}".format(p['precio']).replace(",", ".") }}</div>
      </div>

      <p class="desc">{{ p['desc'] }}</p>

      <form action="{{ url_for('cart_add', pid=p['id']) }}" method="post">
        <button class="btn btn--ghost" type="submit">Agregar</button>
      </form>
    </div>
  </article>
  {% endfor %}
</section>

{% endblock %}
