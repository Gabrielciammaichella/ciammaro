{% extends "base.html" %}
{% block title %}Ciammaro — Iniciar sesión{% endblock %}

{% block content %}
<div class="auth">
  <h1>Iniciá sesión</h1>

  <form method="post" action="/login">
    <label for="email">Email</label>
    <input
      id="email"
      name="email"
      type="email"
      placeholder="tu@email.com"
      required
    >

    <label for="password">Contraseña</label>
    <input
      id="password"
      name="password"
      type="password"
      placeholder="••••••••"
      required
    >

    <a href="#" class="forgot">¿Olvidaste tu contraseña?</a>

    <button type="submit">Iniciar sesión</button>
  </form>

  <div class="switch">
    ¿No tenés cuenta aún?
    <a href="/register">Crear cuenta</a>
  </div>
</div>
{% endblock %}
