{% extends "base.html" %}
{% block title %}Iniciar sesión — Ciammaro{% endblock %}

{% block content %}
<section class="auth">
  <div class="auth__logo">
    <img src="{{ url_for('static', filename='logo-ciammaro.png') }}" alt="Ciammaro" style="height:40px;">
  </div>
  <h1>Bienvenido</h1>

  <form class="auth__form" method="post">
    <div class="field">
      <label>Email</label>
      <input type="email" name="email" placeholder="tu@email.com" required autocomplete="email">
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" name="password" placeholder="••••••••" required autocomplete="current-password">
    </div>
    <button class="auth__submit" type="submit">Iniciar sesión</button>
  </form>

  <p class="auth__switch">
    ¿No tenés cuenta? <a href="{{ url_for('register') }}">Registrate gratis</a>
  </p>
</section>
{% endblock %}
